  name: workload-b-scaler
  namespace: app-b
spec:
  scaleTargetRef:
    name: workload-b
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: azure-servicebus
      metadata:
        namespace: <SB_B_NAMESPACE>
        queueName: orders
