# Service accounts.
#
# IMPORTANT (AKS KEDA add-on): You normally do NOT create the keda-operator
# service account yourself — the add-on manages it in kube-system. It is shown
# here ONLY to illustrate the annotation/label the add-on applies for its
# default identity (id-keda). With the managed add-on you pass the KEDA client
# id at enable time; this manifest is documentation of the resulting object.
#
# The workload service accounts below ARE yours to create — they let each
# # workload POD use its own identity at runtime (separate from KEDA scaling).
# ---
# # ---- KEDA operator SA (managed by the add-on; shown for reference) -----------
# apiVersion: v1
# kind: ServiceAccount
# metadata:
#   name: keda-operator
#   namespace: kube-system
#   labels:
#     azure.workload.identity/use: "true"
#   annotations:
#     # clientId of id-keda (KEDA's default identity, NO Service Bus access).
#     azure.workload.identity/client-id: "<KEDA_CLIENT_ID>"
# ---
apiVersion: v1
kind: Namespace
metadata:
  name: app-a
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-a-sa
  namespace: app-a
  labels:
    azure.workload.identity/use: "true"
  annotations:
    # clientId of id-workload-a (access to Service Bus A).
    azure.workload.identity/client-id: "ab1026d2-d51d-4a8b-bf9c-3068cb335f37"
---
apiVersion: v1
kind: Namespace
metadata:
  name: app-b
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-b-sa
  namespace: app-b
  labels:
    azure.workload.identity/use: "true"
  annotations:
    # clientId of id-workload-b (access to Service Bus B).
    azure.workload.identity/client-id: "f332dd3f-45ce-4551-b36a-2b6ea975ac3a"
---
apiVersion: v1
kind: Namespace
metadata:
  name: app-c
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-c-sa
  namespace: app-c
  labels:
    azure.workload.identity/use: "true"
  annotations:
    # clientId of id-workload-c (access to Service Bus C).
    azure.workload.identity/client-id: "174cf40d-0da3-46c8-9ac1-a6eda9fd8ceb"
